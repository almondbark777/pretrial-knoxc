<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Check-In Received — Knox County Pre-Trial</title>
<style>
body{margin:0;background:#f4f6f9;color:#11161d;font:16px/1.5 -apple-system,Segoe UI,Roboto,Arial,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center;padding:20px}
.box{max-width:440px;background:#fff;border:1px solid #d8dee7;border-radius:16px;padding:30px;text-align:center}
.check{width:64px;height:64px;border-radius:50%;background:#e7f5ee;color:#1c7a4a;font-size:34px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
h1{font-size:22px;margin:0 0 8px}
p{color:#5b6573;margin:6px 0}
.brand{margin-top:18px;font-size:12.5px;color:#8a93a0}
</style>
</head>
<body>
  <div class="box">
    <div class="check">✓</div>
    <h1>Check-in received</h1>
    <p>Thank you. Your check-in has been submitted and is now waiting for a Pre-Trial officer to review.</p>
    <p>You can close this page. If anything is needed, your officer will contact you.</p>
    <div class="brand">Knox County Sheriff's Office · Pre-Trial Release Services</div>
  </div>
</body>
</html>
