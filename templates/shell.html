<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Knox County Pre-Trial — Client Tracker</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1f4e79">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pre-Trial">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="stylesheet" href="/static/app.css">
</head>
<body class="shell">
<header class="shell-bar">
  <strong class="brand"><span class="brand-mark"></span>Knox County Pre-Trial</strong>
  <span class="muted shell-sub">Client Tracker</span>
  <span class="grow"></span>
  {{template "freshstamp"}}
  <span class="muted">{{.User}}</span>
  <a class="btn" href="/console" title="Open the case management console">Open Console &rarr;</a>
  <button type="button" class="pilllink" onclick="fetch('/api/logout',{method:'POST'}).then(()=>location.href='/login')">Sign out</button>
</header>
<iframe class="shell-frame" src="/static/lookup/PTR_Client_Lookup.html" title="PTR Client Lookup"></iframe>
</body>
</html>
